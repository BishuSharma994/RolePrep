name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_B64 }}" | base64 --decode > ~/.ssh/roleprep_deploy_key
          chmod 600 ~/.ssh/roleprep_deploy_key

      - name: Deploy to VPS over SSH
        shell: bash
        run: |
          ssh -i ~/.ssh/roleprep_deploy_key -o StrictHostKeyChecking=no "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "export APP_ROOT='${{ secrets.VPS_APP_ROOT }}' VENV_PATH='${{ secrets.VPS_VENV_PATH }}' SERVICE_NAME='${{ secrets.VPS_SERVICE_NAME }}' BRANCH='main'; bash '${{ secrets.VPS_APP_ROOT }}/deploy.sh'"
